# Пример конфигурации Nginx для Django-сайта.
# Скопировать в /etc/nginx/sites-available/ и подставить server_name и пути.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /var/www/axelot-site/staticfiles/;
    }

    location /media/ {
        alias /var/www/axelot-site/media/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/var/www/axelot-site/axelot.sock;
    }
}
